[build]
builder = "DOCKERFILE"
# Dockerfile path relative to the MONOREPO root (set Root Directory = "/" in Railway)
dockerfilePath = "services/trading-engine/Dockerfile"

[deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# The service exits gracefully after market close.
# Railway will NOT auto-restart it until the next deploy or manual restart.
# Use Railway cron jobs to start it each morning at 8:55 AM IST (3:25 AM UTC).
